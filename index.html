<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Pedidos de Transporte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0f1419;
      --color-surface: #1a2332;
      --color-border: #2d3a4f;
      --color-primary: #3b82f6;
      --color-primary-hover: #2563eb;
      --color-accent: #22c55e;
      --color-text: #f1f5f9;
      --color-text-muted: #94a3b8;
      --color-error: #ef4444;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: var(--color-bg); color: var(--color-text); min-height: 100vh; padding: 2rem 1rem; }
    .app { max-width: 640px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    header p { color: var(--color-text-muted); font-size: 0.95rem; }
    .formulario { background: var(--color-surface); border-radius: var(--radius); padding: 2rem; border: 1px solid var(--color-border); }
    .form-section { margin-bottom: 2rem; }
    .form-section h2 { font-size: 0.85rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
    input, select { width: 100%; padding: 0.75rem 1rem; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 8px; color: var(--color-text); font-size: 0.95rem; font-family: inherit; }
    input:focus, select:focus { outline: none; border-color: var(--color-primary); }
    input.error, select.error { border-color: var(--color-error); }
    .error-msg { font-size: 0.8rem; color: var(--color-error); margin-top: 0.35rem; }
    .checkbox-label { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
    .checkbox-label input { width: 1.25rem; height: 1.25rem; accent-color: var(--color-primary); }
    .section-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
    .section-header h2 { margin-bottom: 0; }
    .btn-add { padding: 0.5rem 1rem; background: transparent; border: 1px dashed var(--color-border); border-radius: 8px; color: var(--color-text-muted); font-size: 0.875rem; cursor: pointer; }
    .btn-add:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .palet-block { background: var(--color-bg); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid var(--color-border); }
    .palet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-size: 0.875rem; color: var(--color-text-muted); }
    .btn-remove { padding: 0.35rem 0.75rem; background: transparent; border: none; color: var(--color-error); font-size: 0.8rem; cursor: pointer; }
    .btn-remove:hover { background: rgba(239,68,68,0.15); border-radius: 6px; }
    .palet-fields { display: grid; gap: 1rem; }
    @media (min-width: 600px) { .palet-fields { grid-template-columns: 80px 1fr 80px 100px auto; align-items: end; } }
    .form-row { display: grid; gap: 1rem; }
    @media (min-width: 480px) { .form-row { grid-template-columns: 1fr 120px; } }
    .input-inline { margin-top: 0.5rem; }
    .mensaje { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
    .mensaje-exito { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); color: var(--color-accent); }
    .mensaje-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: var(--color-error); }
    .btn-submit { width: 100%; padding: 1rem; background: var(--color-primary); border: none; border-radius: 8px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-submit:hover:not(:disabled) { background: var(--color-primary-hover); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Gestión de Pedidos de Transporte</h1>
      <p>Solicitud de transporte entre departamentos</p>
    </header>
    <form class="formulario" id="formPedido">
      <div class="form-section">
        <h2>Datos del envío</h2>
        <div class="form-group form-row">
          <div>
            <label for="origen">Origen *</label>
            <input id="origen" type="text" placeholder="Ej: Almacén Central, Madrid" required>
            <span class="error-msg" id="err-origen"></span>
          </div>
          <div>
            <label for="cpOrigen">C.P. origen *</label>
            <input id="cpOrigen" type="text" placeholder="Ej: 28001" maxlength="10" required>
            <span class="error-msg" id="err-cpOrigen"></span>
          </div>
        </div>
        <div class="form-group form-row">
          <div>
            <label for="destino">Destino *</label>
            <input id="destino" type="text" placeholder="Ej: Sucursal Barcelona" required>
            <span class="error-msg" id="err-destino"></span>
          </div>
          <div>
            <label for="cpDestino">C.P. destino *</label>
            <input id="cpDestino" type="text" placeholder="Ej: 08001" maxlength="10" required>
            <span class="error-msg" id="err-cpDestino"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="servicioEspecial">
            <span>¿Requiere servicio especial?</span>
          </label>
        </div>
        <div class="form-group" id="contenedorServicioEspecial" style="display:none">
          <label for="tipoServicioEspecial">Tipo de servicio especial</label>
          <select id="tipoServicioEspecial">
            <option value="">Selecciona una opción</option>
            <option value="camion_plataforma_transpalet">Camión plataforma y transpalet</option>
            <option value="camion_frigorifico">Camión frigorífico</option>
            <option value="camion_lona">Camión lona</option>
            <option value="camion_pequeno">Camión pequeño</option>
          </select>
          <span class="error-msg" id="err-tipoServicioEspecial"></span>
        </div>
      </div>

      <div class="form-section">
        <div class="section-header">
          <h2>Palets</h2>
          <button type="button" class="btn-add" id="btnAgregarPalet">+ Añadir tipo de palet</button>
        </div>
        <div id="contenedorPalets"></div>
      </div>

      <div id="mensaje" class="mensaje" style="display:none"></div>
      <button type="submit" class="btn-submit" id="btnEnviar">Registrar pedido</button>
    </form>
  </div>

  <script>
    const SUPABASE_URL = 'https://ismjjykfmfpfgpviquxu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzbWpqeWtmbWZwZmdwdmlxdXh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzIwMjgsImV4cCI6MjA4Nzk0ODAyOH0.RS3_4lOeTpq7pAhDZyVmqYEBbhxhNEXO_8JmNg2XKhk';
    const WEBHOOK_URL = 'https://cotizacion-transportes.app.n8n.cloud/webhook-test/50093655-0eb0-4afb-be30-593202ff0432';

    async function enviarASupabase(pedido) {
      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      };
      const resPedido = await fetch(SUPABASE_URL + '/rest/v1/pedidos', {
        method: 'POST',
        headers,
        body: JSON.stringify({
          origen: pedido.origen,
          cp_origen: pedido.cp_origen,
          destino: pedido.destino,
          cp_destino: pedido.cp_destino,
          servicio_especial: pedido.servicio_especial,
          tipo_servicio_especial: pedido.tipo_servicio_especial
        })
      });
      if (!resPedido.ok) {
        const err = await resPedido.json();
        throw new Error(err.message || 'Error al crear pedido');
      }
      const [pedidoCreado] = await resPedido.json();
      const paletsData = pedido.palets.map(p => ({
        pedido_id: pedidoCreado.id,
        cantidad: p.cantidad,
        medida: p.medida,
        peso: p.peso,
        remontable: p.remontable
      }));
      const resPalets = await fetch(SUPABASE_URL + '/rest/v1/pedido_palets', {
        method: 'POST',
        headers,
        body: JSON.stringify(paletsData)
      });
      if (!resPalets.ok) {
        const err = await resPalets.json();
        throw new Error(err.message || 'Error al guardar palets');
      }
      return { pedidoCreado, paletsData };
    }

    async function enviarAWebhook(pedido, pedidoCreado, paletsData) {
      const totalLineas = paletsData.length;
      const totalPalets = paletsData.reduce((acc, p) => acc + (p.cantidad || 0), 0);
      const pesoTotalKg = paletsData.reduce(
        (acc, p) => acc + (p.cantidad || 0) * (p.peso || 0),
        0
      );

      const payload = {
        pedido: {
          id: pedidoCreado.id,
          created_at: pedidoCreado.created_at,
          origen: {
            nombre: pedido.origen,
            cp: pedido.cp_origen
          },
          destino: {
            nombre: pedido.destino,
            cp: pedido.cp_destino
          },
          servicio: {
            especial: pedido.servicio_especial,
            tipo: pedido.tipo_servicio_especial
          },
          resumen: {
            lineas_palets: totalLineas,
            total_palets: totalPalets,
            peso_total_kg: pesoTotalKg
          }
        },
        palets: paletsData.map((p, index) => ({
          linea: index + 1,
          cantidad: p.cantidad,
          medida: p.medida,
          peso_kg_por_palet: p.peso,
          peso_total_linea_kg: (p.cantidad || 0) * (p.peso || 0),
          remontable: p.remontable
        }))
      };
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }

    const MEDIDAS = [
      { valor: '80x120', label: 'Pallet europeo 80×120 cm' },
      { valor: '100x120', label: 'Pallet americano 100×120 cm' }
    ];
    let palets = [{ cantidad: '', medida: '', altura: '', peso: '', remontable: true }];

    function renderPalets() {
      const cont = document.getElementById('contenedorPalets');
      cont.innerHTML = palets.map((p, i) => `
        <div class="palet-block" data-index="${i}">
          <div class="palet-header">
            <span>Tipo de palet ${palets.length > 1 ? i + 1 : ''}</span>
            ${palets.length > 1 ? '<button type="button" class="btn-remove">Eliminar</button>' : ''}
          </div>
          <div class="palet-fields">
            <div class="form-group">
              <label>Cantidad *</label>
              <input type="number" min="1" value="${p.cantidad}" placeholder="Ej: 4" data-field="cantidad">
              <span class="error-msg" id="err-palet-${i}-cantidad"></span>
            </div>
            <div class="form-group">
              <label>Medidas pallet *</label>
              <select data-field="medida">
                <option value="">Selecciona tipo</option>
                ${MEDIDAS.map(m => `<option value="${m.valor}" ${p.medida === m.valor ? 'selected' : ''}>${m.label}</option>`).join('')}
              </select>
              <span class="error-msg" id="err-palet-${i}-medida"></span>
            </div>
            <div class="form-group">
              <label>Altura (cm) *</label>
              <input type="number" min="1" value="${p.altura || ''}" placeholder="Ej: 150" data-field="altura">
              <span class="error-msg" id="err-palet-${i}-altura"></span>
            </div>
            <div class="form-group">
              <label>Peso/palet (kg) *</label>
              <input type="number" step="0.01" min="0" value="${p.peso || ''}" placeholder="Ej: 500" data-field="peso">
              <span class="error-msg" id="err-palet-${i}-peso"></span>
            </div>
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" ${p.remontable ? 'checked' : ''} data-field="remontable">
                <span>Remontable</span>
              </label>
            </div>
          </div>
        </div>
      `).join('');

      cont.querySelectorAll('.palet-block').forEach(block => {
        const i = +block.dataset.index;
        block.querySelectorAll('[data-field]').forEach(el => {
          const field = el.dataset.field;
          const handler = () => {
            palets[i][field] = el.type === 'checkbox' ? el.checked : el.value;
            if (field === 'medida') renderPalets();
          };
          el.addEventListener(el.type === 'checkbox' ? 'change' : 'input', handler);
        });
        const btn = block.querySelector('.btn-remove');
        if (btn) btn.addEventListener('click', () => { palets.splice(i, 1); renderPalets(); });
      });
    }

    document.getElementById('servicioEspecial').addEventListener('change', (e) => {
      document.getElementById('contenedorServicioEspecial').style.display = e.target.checked ? 'block' : 'none';
      if (!e.target.checked) document.getElementById('tipoServicioEspecial').value = '';
    });

    document.getElementById('btnAgregarPalet').addEventListener('click', () => {
      palets.push({ cantidad: '', medida: '', altura: '', peso: '', remontable: true });
      renderPalets();
    });

    function syncPaletsFromDOM() {
      document.querySelectorAll('.palet-block').forEach(block => {
        const i = +block.dataset.index;
        block.querySelectorAll('[data-field]').forEach(el => {
          const f = el.dataset.field;
          palets[i][f] = el.type === 'checkbox' ? el.checked : el.value;
        });
      });
    }

    function validar() {
      const origen = document.getElementById('origen').value.trim();
      const destino = document.getElementById('destino').value.trim();
      const cpOrigen = document.getElementById('cpOrigen').value.trim();
      const cpDestino = document.getElementById('cpDestino').value.trim();
      document.querySelectorAll('.error-msg').forEach(e => e.textContent = '');
      document.querySelectorAll('.error').forEach(e => e.classList.remove('error'));
      let ok = true;

      if (!origen) { document.getElementById('err-origen').textContent = 'El origen es obligatorio'; document.getElementById('origen').classList.add('error'); ok = false; }
      if (!cpOrigen) { document.getElementById('err-cpOrigen').textContent = 'Código postal obligatorio'; document.getElementById('cpOrigen').classList.add('error'); ok = false; }
      if (!destino) { document.getElementById('err-destino').textContent = 'El destino es obligatorio'; document.getElementById('destino').classList.add('error'); ok = false; }
      if (!cpDestino) { document.getElementById('err-cpDestino').textContent = 'Código postal obligatorio'; document.getElementById('cpDestino').classList.add('error'); ok = false; }

      const servicioEspecial = document.getElementById('servicioEspecial').checked;
      const tipoServicio = document.getElementById('tipoServicioEspecial').value;
      if (servicioEspecial && !tipoServicio) {
        document.getElementById('err-tipoServicioEspecial').textContent = 'Selecciona el tipo de servicio especial';
        document.getElementById('tipoServicioEspecial').classList.add('error');
        ok = false;
      }

      syncPaletsFromDOM();
      palets.forEach((p, i) => {
        const cant = p.cantidad;
        const med = p.medida;
        const alt = p.altura;
        const pes = p.peso;
        if (!cant || parseInt(cant) < 1) {
          document.getElementById(`err-palet-${i}-cantidad`).textContent = 'Cantidad obligatoria';
          ok = false;
        }
        if (!med?.trim()) {
          document.getElementById(`err-palet-${i}-medida`).textContent = 'Medidas obligatorias';
          ok = false;
        }
        if (!alt || isNaN(parseInt(alt)) || parseInt(alt) < 1) {
          document.getElementById(`err-palet-${i}-altura`).textContent = 'Altura obligatoria';
          ok = false;
        }
        if (!pes || isNaN(parseFloat(pes)) || parseFloat(pes) <= 0) {
          document.getElementById(`err-palet-${i}-peso`).textContent = 'Peso obligatorio';
          ok = false;
        }
      });
      return ok;
    }

    function mostrarMensaje(tipo, texto) {
      const m = document.getElementById('mensaje');
      m.textContent = texto;
      m.className = 'mensaje mensaje-' + tipo;
      m.style.display = 'block';
    }

    document.getElementById('formPedido').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('mensaje').style.display = 'none';
      if (!validar()) return;

      syncPaletsFromDOM();
      const pedido = {
        origen: document.getElementById('origen').value.trim(),
        cp_origen: document.getElementById('cpOrigen').value.trim(),
        destino: document.getElementById('destino').value.trim(),
        cp_destino: document.getElementById('cpDestino').value.trim(),
        servicio_especial: document.getElementById('servicioEspecial').checked,
        tipo_servicio_especial: document.getElementById('servicioEspecial').checked ? document.getElementById('tipoServicioEspecial').value : null,
        palets: palets.map(p => ({
          cantidad: parseInt(p.cantidad),
          medida: p.medida + 'x' + p.altura,
          peso: parseFloat(p.peso),
          remontable: p.remontable
        }))
      };

      const btn = document.getElementById('btnEnviar');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        const { pedidoCreado, paletsData } = await enviarASupabase(pedido);
        await enviarAWebhook(pedido, pedidoCreado, paletsData);
        mostrarMensaje('exito', 'Pedido registrado correctamente');
        document.getElementById('origen').value = '';
        document.getElementById('cpOrigen').value = '';
        document.getElementById('destino').value = '';
        document.getElementById('cpDestino').value = '';
        document.getElementById('servicioEspecial').checked = false;
        document.getElementById('contenedorServicioEspecial').style.display = 'none';
        document.getElementById('tipoServicioEspecial').value = '';
        palets = [{ cantidad: '', medida: '', altura: '', peso: '', remontable: true }];
        renderPalets();
      } catch (err) {
        mostrarMensaje('error', err.message || 'Error al registrar');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Registrar pedido';
      }
    });

    renderPalets();
  </script>
</body>
</html>
